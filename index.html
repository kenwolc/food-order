<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Datang - Kiosk Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body"> <div class="landing-container">
    <h1>Selamat Datang di Self Order Kiosk</h1>
    <p>Silakan pilih metode makan Anda:</p>
    
    <div class="landing-buttons">
      <button onclick="pilihMetode('Dine In')">Makan Di Sini (Dine In)</button>
      <button onclick="pilihMetode('Take Away')">Bawa Pulang (Take Away)</button>
    </div>
  </div>

  <script>
    function pilihMetode(metode) {
      // Menyimpan tipe order agar bisa dibaca oleh app.js di halaman menu
      localStorage.setItem('orderType', metode);
      // Pindah ke halaman menu utama
      window.location.href = 'menu.html';
    }
  </script>

</body>
</html>
